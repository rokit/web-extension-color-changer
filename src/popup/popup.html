<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="square-color-picker.css" />
  </head>

  <body>
    <div id="content">
      <div id="checkbox-container">
        <label for="change-colors" id="change-colors-label"
          >Change Colors</label
        >
        <input type="checkbox" id="change-colors" name="change-colors" />
      </div>

      <div id="color-picker">
        <div id="square-hsv">
          <div id="hue"></div>
          <div id="hue-overlay"></div>
          <canvas id="square-canvas" draggable="false"></canvas>
          <img
            id="square-reticle"
            src="/images/reticle.svg"
            draggable="false"
          />
          <img
            id="hue-reticle"
            src="/images/hue-reticle.svg"
            draggable="false"
          />
        </div>
        <div id="hex-field">
          <label for="hex" title="Enter hex code for color.">#:</label>
          <input id="hex-input" type="text" value="FF0000" maxlength="6" />
        </div>
        <div id="stats">
          <p><span>h:</span><span id="selected-hue"></span></p>
          <p><span>s:</span><span id="selected-saturation"></span></p>
          <p><span>v:</span><span id="selected-value"></span></p>
        </div>
      </div>

      <section id="colors">
        <label for="text">Text</label>
        <button id="text"></button>

        <label for="background">Background</label>
        <button id="background"></button>

        <label for="link">Link</label>
        <button id="link"></button>

        <label for="linkHovered">Link Hovered</label>
        <button id="linkHovered"></button>

        <label for="blank" aria-hidden="true"></label>
        <div id="blank" aria-hidden="true"></div>

        <label for="linkVisited">Link Visited</label>
        <button id="linkVisited"></button>
      </section>
    </div>
    <footer>
      <button
        id="reset"
        title="Resets Color Changer to default settings and resets all pages that had Color Changer applied."
      >
        Reset
      </button>
    </footer>
    <script src="popup.ts" type="module"></script>
  </body>
</html>
