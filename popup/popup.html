<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="square-color-picker.css" />
  </head>

  <body>
    <div id="content">
      <div id="checkbox-container">
        <label for="change-colors" id="change-colors-label"
          >Change Colors</label
        >
        <input type="checkbox" id="change-colors" name="change-colors" />
      </div>

      <div id="color-picker">
        <div id="square-hsv">
          <div id="hue"></div>
          <div id="hue-overlay"></div>
          <canvas id="square-canvas" draggable="false"></canvas>
          <img
            id="square-reticle"
            src="/assets/reticle.svg"
            draggable="false"
          />
          <img
            id="hue-reticle"
            src="/assets/hue-reticle.svg"
            draggable="false"
          />
        </div>
        <div id="hex-field">
          <label for="hex" title="Enter hex code for color.">#:</label>
          <input id="hex-input" type="text" value="FF0000" maxlength="6" />
        </div>
      </div>

      <section id="colors">
        <button id="fore">Text Color</button>
        <div id="fore-swatch" class="swatch"></div>
        <button id="back">Background Color</button>
        <div id="back-swatch" class="swatch"></div>
        <button id="link">Link Color</button>
        <div id="link-swatch" class="swatch"></div>
      </section>
    </div>
    <footer>
      <!-- <a id="donate" target="_blank" href="http://color-changer.surge.sh/" title="If you like this add-on, please consider donating. Thank you!">Donate</a> -->
      <button
        id="reset"
        title="Resets Color Changer to default settings and resets all pages that had Color Changer applied."
      >
        Reset
      </button>
    </footer>
    <script src="popup.ts" type="module"></script>
  </body>
</html>
